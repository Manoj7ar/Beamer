<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black square background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- 8 sun rays radiating from center (50,50) -->
  <!-- inner radius 18, outer radius 38 -->

  <!-- Right (0°) -->
  <line x1="68" y1="50" x2="88" y2="50" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Top-right (45°) -->
  <line x1="62.7" y1="37.3" x2="76.9" y2="23.1" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Top (90°) -->
  <line x1="50" y1="32" x2="50" y2="12" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Top-left (135°) -->
  <line x1="37.3" y1="37.3" x2="23.1" y2="23.1" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left (180°) -->
  <line x1="32" y1="50" x2="12" y2="50" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom-left (225°) -->
  <line x1="37.3" y1="62.7" x2="23.1" y2="76.9" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom (270°) -->
  <line x1="50" y1="68" x2="50" y2="88" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom-right (315°) -->
  <line x1="62.7" y1="62.7" x2="76.9" y2="76.9" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>

  <!-- White center dot -->
  <circle cx="50" cy="50" r="11" fill="#ffffff"/>
</svg>
